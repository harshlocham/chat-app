name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MONGODB_URI: mongodb://localhost:27017/test
  REDIS_URL: redis://localhost:6379
  NEXTAUTH_SECRET: testSecret
  NEXTAUTH_URL: http://localhost:3000
  INTERNAL_SECRET: testInternalSecret
  TURBO_ENV_MODE: loose

jobs:
  quality:
    name: Quality (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node-version }}-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'turbo.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build -- "--filter=./packages/*"

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build monorepo
        run: npm run build

      - name: Verify build artifacts
        run: npm run ci:verify-artifacts

  web-runtime:
    name: Web Runtime Smoke Test
    runs-on: ubuntu-latest
    needs: quality

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Start web app
        run: |
          npm run start --workspace=@chat/web &
          sleep 10

      - name: Check web health
        run: curl -f http://127.0.0.1:3000 || exit 1

  socket-runtime:
    name: Socket Runtime + WS Test
    runs-on: ubuntu-latest
    needs: quality

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Build socket image
        run: docker build -f docker/socket.Dockerfile -t chat-socket:ci .

      - name: Start socket container
        run: |
          docker run -d --name chat-socket-ci -p 3001:3001 \
            -e REDIS_URL=redis://host.docker.internal:6379 \
            -e INTERNAL_SECRET=testInternalSecret \
            -e ORIGIN=http://localhost \
            chat-socket:ci

      - name: Wait for health
        run: |
          for i in {1..30}; do
            curl -f http://127.0.0.1:3001/health && exit 0
            sleep 2
          done
          exit 1

      - name: WebSocket connection test
        run: |
          node <<'NODE'
          const { io } = require("socket.io-client");

          const socket = io("http://localhost:3001", {
            transports: ["websocket"],
            timeout: 5000,
          });

          socket.on("connect", () => {
            console.log("WS connected");
            process.exit(0);
          });

          socket.on("connect_error", (err) => {
            console.error("WS failed", err.message);
            process.exit(1);
          });
          NODE

      - name: Cleanup
        if: always()
        run: docker rm -f chat-socket-ci || true