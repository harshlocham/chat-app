name: Deploy

on:
  # Deploy only from release tags created by the release workflow.
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  # Never cancel a running deployment for the same tag.
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push-socket:
    name: Build And Push Socket Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_name: ${{ steps.meta.outputs.image_name }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract deployment metadata
        id: meta
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-socket"
          VERSION_TAG="${IMAGE_NAME}:${VERSION}"
          LATEST_TAG="${IMAGE_NAME}:latest"

          {
            echo "version=${VERSION}"
            echo "image_name=${IMAGE_NAME}"
            echo "version_tag=${VERSION_TAG}"
            echo "latest_tag=${LATEST_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build socket image
        run: |
          set -euo pipefail
          docker build \
            -f docker/socket.Dockerfile \
            -t "${{ steps.meta.outputs.version_tag }}" \
            -t "${{ steps.meta.outputs.latest_tag }}" \
            .

      - name: Push image tags
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.version_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push-socket

    steps:
      - name: Simulate staging deployment
        run: |
          set -euo pipefail
          echo "Deploying ${{ needs.build-and-push-socket.outputs.version_tag }} to staging"

      - name: Validate staging variables
        env:
          STAGING_WEB_URL: ${{ vars['STAGING_WEB_URL'] }}
          STAGING_SOCKET_HEALTH_URL: ${{ vars['STAGING_SOCKET_HEALTH_URL'] }}
        run: |
          set -euo pipefail
          for var in STAGING_WEB_URL STAGING_SOCKET_HEALTH_URL; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required variable: $var"
              exit 1
            fi
          done

      - name: Verify staging health checks
        env:
          STAGING_WEB_URL: ${{ vars['STAGING_WEB_URL'] }}
          STAGING_SOCKET_HEALTH_URL: ${{ vars['STAGING_SOCKET_HEALTH_URL'] }}
        run: |
          set -euo pipefail

          check_url() {
            local name="$1"
            local url="$2"
            for attempt in {1..30}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$name is healthy: $url"
                return 0
              fi
              sleep 10
            done
            echo "::error::$name failed health check: $url"
            return 1
          }

          check_url "Staging web" "$STAGING_WEB_URL"
          check_url "Staging socket" "$STAGING_SOCKET_HEALTH_URL"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-and-push-socket]
    environment:
      name: production

    steps:
      - name: Simulate production deployment
        run: |
          set -euo pipefail
          echo "Deploying ${{ needs.build-and-push-socket.outputs.version_tag }} to production"

      - name: Validate production variables
        env:
          PROD_WEB_URL: ${{ vars['PROD_WEB_URL'] }}
          PROD_SOCKET_HEALTH_URL: ${{ vars['PROD_SOCKET_HEALTH_URL'] }}
        run: |
          set -euo pipefail
          for var in PROD_WEB_URL PROD_SOCKET_HEALTH_URL; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required variable: $var"
              exit 1
            fi
          done


      - name: Verify production health checks
        env:
          PROD_WEB_URL: ${{ vars['PROD_WEB_URL'] }}
          PROD_SOCKET_HEALTH_URL: ${{ vars['PROD_SOCKET_HEALTH_URL'] }}
        run: |
          set -euo pipefail

          check_url() {
            local name="$1"
            local url="$2"
            for attempt in {1..30}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$name is healthy: $url"
                return 0
              fi
              sleep 10
            done
            echo "::error::$name failed health check: $url"
            return 1
          }

          check_url "Production web" "$PROD_WEB_URL"
          check_url "Production socket" "$PROD_SOCKET_HEALTH_URL"

      - name: Deployment summary
        run: |
          set -euo pipefail
          {
            echo "### Production deployment completed"
            echo ""
            echo "- Version: ${{ needs['build-and-push-socket'].outputs.version }}"
            echo "- Image: ${{ needs['build-and-push-socket'].outputs.image_name }}"
            echo "- Image tag: ${{ needs['build-and-push-socket'].outputs.version_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
