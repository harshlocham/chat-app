name: Deploy

on:
  # Deploy ONLY from services package tags
  push:
    tags:
      - "@chat/services@*"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push-socket:
    name: Build And Push Socket Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      package: ${{ steps.tag_meta.outputs.package }}
      version: ${{ steps.meta.outputs.version }}
      image_name: ${{ steps.meta.outputs.image_name }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2  
        with:
          fetch-depth: 0

      - name: Validate and parse changeset tag
        id: tag_meta
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          SEMVER_RE='(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?'
          TAG_RE="^@chat/([a-z0-9-]+)@(${SEMVER_RE})$"

          if [[ ! "$TAG" =~ $TAG_RE ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi

          PACKAGE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"

          if [[ "$PACKAGE" != "services" ]]; then
            echo "::error::Only services package is deployable"
            exit 1
          fi

          DOCKERFILE="docker/socket.Dockerfile"

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"

      - name: Ensure PAT is configured
        run: |
          if [[ -z "${{ secrets.CHANGESETS_GITHUB_TOKEN }}" ]]; then
            echo "::error::Missing CHANGESETS_GITHUB_TOKEN"
            exit 1
          fi

      - name: Verify tag provenance
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          git fetch origin main
          TAG_SHA="$(git rev-list -n 1 "$TAG")"

          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tag is not from main branch"
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CHANGESETS_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            > /dev/null

          echo "Provenance verified"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Extract metadata
        id: meta
        run: |
          set -euo pipefail

          VERSION="${{ steps.tag_meta.outputs.version }}"
          PACKAGE="${{ steps.tag_meta.outputs.package }}"

          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-${PACKAGE}"

          SAFE_VERSION="${VERSION//+/_}"

          VERSION_TAG="${IMAGE_NAME}:${SAFE_VERSION}"

          if [[ "$VERSION" != *"-"* ]]; then
            LATEST_TAG="${IMAGE_NAME}:latest"
          else
            LATEST_TAG=""
          fi

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f "${{ steps.tag_meta.outputs.dockerfile }}" \
            -t "${{ steps.meta.outputs.version_tag }}" \
            .

          if [[ -n "${{ steps.meta.outputs.latest_tag }}" ]]; then
            docker tag "${{ steps.meta.outputs.version_tag }}" "${{ steps.meta.outputs.latest_tag }}"
          fi

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.version_tag }}"

          if [[ -n "${{ steps.meta.outputs.latest_tag }}" ]]; then
            docker push "${{ steps.meta.outputs.latest_tag }}"
          fi

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push-socket

    steps:
      - run: echo "Deploying ${{ needs.build-and-push-socket.outputs.version_tag }} to staging"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-and-push-socket]
    environment:
      name: production

    steps:
      - run: echo "Deploying ${{ needs.build-and-push-socket.outputs.version_tag }} to production"