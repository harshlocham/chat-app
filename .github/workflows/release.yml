name: Release

on:
  workflow_run:
    # Listen only to the existing CI workflow.
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    name: Version And Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

     # Release only from successful CI runs on main.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history is required for tags and changesets versioning.
          fetch-depth: 0
          # Release the exact commit SHA that passed CI.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Skip if this commit is already tagged
        id: release_guard
        run: |
          set -euo pipefail
          RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch --tags
          TAGS="$(git tag --points-at "$RELEASE_SHA" | xargs || true)"
          if [[ -n "$TAGS" ]]; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "found_tags=$TAGS" >> "$GITHUB_OUTPUT"
            echo "Commit $RELEASE_SHA already has tag(s): $TAGS"
            echo "Skipping release to keep workflow idempotent."
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
            echo "No tags found for commit $RELEASE_SHA."
          fi

      - name: Setup Node.js 22 with npm cache
        if: steps.release_guard.outputs.already_released != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.release_guard.outputs.already_released != 'true'
        run: npm ci

      - name: Build monorepo
        if: steps.release_guard.outputs.already_released != 'true'
        run: npm run build

      - name: Create release PR or version and tag
        if: steps.release_guard.outputs.already_released != 'true'
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          # Update versions/changelogs after release PR merge.
          version: npm run version-packages
          # Private repo: create git tags for versioned packages without npm publish.
          publish: npx changeset tag
          # Create GitHub Releases from generated changesets.
          createGithubReleases: true
          # Configure a git identity for commits and tags.
          setupGitUser: true
        env:
          # Prefer dedicated changesets token; fallback to default repo token.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}